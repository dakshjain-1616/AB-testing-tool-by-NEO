experiment:
  name: "Multi-Variant Model Comparison Test"
  traffic_split:
    baseline: 0.4
    variant_a: 0.3
    variant_b: 0.3
  metrics:
    - name: "conversion"
      type: "binary"
      target: "maximize"
    - name: "latency"
      type: "continuous"
      target: "minimize"
      unit: "ms"
  statistical_config:
    alpha: 0.05
    confidence_level: 0.95
    min_sample_size: 100
    power: 0.8
    multiple_comparison_correction: "bonferroni"